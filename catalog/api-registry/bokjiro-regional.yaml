source_id: bokjiro-regional
title: 복지로 지자체복지서비스
role: task_source
primary_priority: 3
access_mode: api_cached
source_org_scope:
- regional
source_org_scope_note: 지방자치단체 복지서비스 행을 regional welfare Task Entry 후보로 수집하는 planned API source입니다.
ingestion_status: planned
ci_stage: registry_validated_only
auth:
  type: serviceKey
  env: BOKJIRO_SERVICE_KEY
  placement: query.serviceKey
paging:
  page_param: pageNo
  per_page_param: numOfRows
  per_page: 100
  start_page: 1
format:
- json
operations:
  serviceList:
    method: GET
    endpoint: https://apis.data.go.kr/B460010/welfareQcpInfoService02/getWelfareQcpInfoList02
    purpose: 지자체 복지서비스 목록 행을 EntryCandidate의 기본 단위로 수집합니다.
mapping_row_to_entry:
  entry_id: stable hash of source_id + service_id
  access_mode: api_cached
  portal: bokjiro
  domain: welfare
  title: row.service_name
  api_ref:
    source_id: bokjiro-regional
    operation: serviceList
    row_id: row.service_id
  handoff: tier3 menu_path from source row or 복지로 > 복지서비스 > 지자체 복지서비스
  persona_tags: LLM Annotation from support_target
  task_intent: LLM Annotation from service_summary/support_content
  life_event_tags: LLM Annotation from support_conditions
  evidence_refs: curated join by domain/region/persona
dedup_policy:
  semantic_fingerprint: semantic_v1
  primary_source_priority: 3
  attach_as_secondary_when_duplicate: true
