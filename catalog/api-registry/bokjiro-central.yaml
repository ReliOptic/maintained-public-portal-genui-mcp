source_id: bokjiro-central
title: 복지로 중앙부처복지서비스
role: task_source
priority: 2
source_org_scope:
- national
source_org_scope_note: 중앙부처 복지서비스 행을 welfare-specialised Task Entry 후보로 수집하는 planned API source입니다.
ingestion_status: planned
ci_stage: registry_validated_only
auth:
  type: serviceKey
  env: BOKJIRO_SERVICE_KEY
  placement: query.serviceKey
operations:
  serviceList:
    method: GET
    endpoint: null
    official_reference: https://www.data.go.kr/
    purpose: 중앙부처 복지서비스 목록 행을 EntryCandidate의 기본 단위로 수집합니다.
mapping_row_to_entry:
  entry_id: stable hash of source_id + service_id
  access_mode: api_cached
  portal: bokjiro
  domain: welfare
  title: row.service_name
  api_ref:
    source_id: bokjiro-central
    operation: serviceList
    row_id: row.service_id
  handoff: tier3 menu_path from source row or 복지로 > 복지서비스 > 중앙부처 복지서비스
  persona_tags: LLM Annotation from support_target
  task_intent: LLM Annotation from service_summary/support_content
  life_event_tags: LLM Annotation from support_conditions
  evidence_refs: curated join by domain/region/persona
dedup_policy:
  content_fingerprint: semantic_v1
  primary_source_priority: 2
  attach_as_secondary_when_duplicate: true
