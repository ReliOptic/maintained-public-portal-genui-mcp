  access_mode: api_cached
  portal: worknet
  domain: welfare
  title: row.program_or_job_name
  api_ref:
    source_id: worknet-supported-jobs
    operation: serviceList
    row_id: row.job_or_program_id
  handoff: tier3 menu_path from source row or 고용24/워크넷 > 정부지원일자리
  persona_tags:
  - job_seeker
  task_intent:
  - employment_support
  life_event_tags:
  - employment
  evidence_refs: curated join by region/persona
ttl_policy:
  last_sync_at_plus_days: 60
  expired_status: archived
dedup_policy:
  content_fingerprint: semantic_v1
  primary_source_priority: 4
  attach_as_secondary_when_duplicate: true
