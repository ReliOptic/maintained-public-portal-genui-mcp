source_id: worknet-supported-jobs
title: 워크넷 정부지원일자리
role: task_source
priority: 4
source_org_scope:
- national
- regional
source_org_scope_note: 정부지원일자리/고용지원성 채용정보 행을 employment-support Task Entry 후보로 수집하는 planned API source입니다.
