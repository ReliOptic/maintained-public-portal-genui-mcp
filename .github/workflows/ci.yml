name: CI

on:
  pull_request:
  push:
    branches:
      - main
      # Bootstrap: this branch introduces the workflow before it exists on main.
      - session1-maintainer-ingestion
      - release/**

permissions:
  contents: read

jobs:
  last-mile:
    name: Last Mile JSON to MCP
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build MCP server
        run: npm run build

      - name: Compile catalog SQLite
        run: npm run compile

      - name: Run unit and integration tests
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run
